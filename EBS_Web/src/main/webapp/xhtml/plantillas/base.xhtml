<?xml version="1.0" encoding="UTF-8"?>
<!DOCTYPE html PUBLIC "-//W3C//DTD XHTML 1.0 Transitional//EN" "http://www.w3.org/TR/xhtml1/DTD/xhtml1-transitional.dtd">
<html xmlns="http://www.w3.org/1999/xhtml"
      xmlns:h="http://java.sun.com/jsf/html"
      xmlns:ui="http://java.sun.com/jsf/facelets"   
      xmlns:f="http://java.sun.com/jsf/core"
      xmlns:p="http://primefaces.org/ui">


    <h:head>
        <link rel="shortcut icon" href="#{request.contextPath}/resources/imagenes/favicon.ico" />
        <f:loadBundle basename="com.powersystem.base.etiquetas" var="label" />
        <title>
            <ui:insert name="titulo">#{label['titulo.nombre.sistema']}</ui:insert>
        </title>

        <!--<meta http-equiv="X-UA-Compatible" content="IE=edge" />-->
        <meta http-equiv="Content-Language" content="es" />
        <meta http-equiv="Content-type" content="application/xhtml+xml; charset=UTF-8" />

        <link href="#{request.contextPath}/resources/css/base.min.css" type="text/css" rel="stylesheet"></link>
        <link href="#{request.contextPath}/resources/css/css_primefaces.min.css" type="text/css" rel="stylesheet"></link>
        <link href="#{request.contextPath}/resources/css/personalizado.min.css" type="text/css" rel="stylesheet"></link>

        <script type="text/javascript" src="#{request.contextPath}/resources/js/hora.min.js"></script>
        <script type="text/javascript" src="#{request.contextPath}/resources/js/funciones.min.js"></script>
        <script type="text/javascript" src="#{request.contextPath}/resources/js/jquery.maskedinput-1.3.min.js"></script>
        <script type="text/javascript" src="#{request.contextPath}/resources/js/util.prime.min.js"></script>
        <script type="text/javascript" src="#{request.contextPath}/resources/js/deployJava.min.js"/> 
        <ui:insert name="java_script">

        </ui:insert>
    </h:head>

    <h:body  > 

        <!-- :::::::::::::::::::::::: -->
        <!-- :::::   Loading    ::::: -->
        <!-- :::::::::::::::::::::::: -->
        <ui:include src="loading.xhtml"/>
        <p:blockUI block="form_sisadmin" widgetVar="bui"/>

        <!--**************************************** 
           SE DEFINE LA ESTRUCTURA PRINCIPAL DE LA 
           PAGINA CON UN TABLE 
        -->
        <table id="tablaContenedora" width="100%" cellpadding="0" cellspacing="0" >

            <tr>
                <td id="barra_superior">
                    <h:form>
                        <ui:insert name="barra_superior">
                            <ui:include src="barra_superior.xhtml"/>
                        </ui:insert>
                    </h:form>
                </td>
            </tr>

            <!-- Area de Trabajo -->
            <tr>
                <td>
                    <h:form id="form_sisadmin">
                        <p:growl id="mensajes"  showDetail="true" sticky="true"/>
                        <ui:include src="/xhtml/paginas/modales/modalConfirmacion.xhtml" />
                        <ui:insert name="mensajes">

                            <!--  <p:messages id="mensajes" showDetail="true" autoUpdate="true"/> -->
                        </ui:insert>
                        <p:hotkey bind="f5" async="true"/>
                        <p:hotkey bind="ctrl+r" async="true"/>
                        <p:hotkey bind="backspace" async="true"/>
                        <table>
                            <tr>
                                <td id="menu_principal">
                                    <p:menu id="menuPrincipalLateral"  model="#{beanMenu.model}"/>     
                                </td>
                                <!-- CONTENIDO -->
                                <td valign="top" style="width: 100%">  

                                    <!-- MENÚ DERECHA 
                                    <td id="menu_contextual">
                                        <ui:insert name="menu.xhtml"></ui:insert>
                                    </td>-->

                                    <h:panelGroup id="cuerpo">

                                        <p:idleMonitor onactive="PF('sessionTimeOutDialog').show()" timeout="#{session.maxInactiveInterval * 1000}"/>
                                        <p:dialog header="Ha caducado la sesión" widgetVar="sessionTimeOutDialog"
                                                  modal="true" closable="false" draggable="false" closeOnEscape="false" resizable="false" 
                                                  width="400" visible="false" position="center" appendTo="@(body)">
                                            <p:panelGrid columns="1" style="text-align:center">
                                                <h:outputText value="Ha caducado la sesión por favor ingrese de nuevo."/>
                                                <p:spacer height="5"/>
                                                <f:facet name="footer">
                                                    <center>
                                                        <p:button id="confirmBackToLogin" value="#{label['logout.reingreso.boton']}"
                                                                  href="#{pageContext.request.contextPath}/login.xhtml"/>

                                                    </center>
                                                </f:facet>
                                            </p:panelGrid>
                                        </p:dialog>
                                        <!-- Titulos Principales -->                                           
                                        <ui:insert name="contenido"> </ui:insert>

                                    </h:panelGroup>

                                </td>  
                            </tr>
                        </table>

                    </h:form>
                </td>
            </tr>            
            <tr>
                <td>
                    <ui:insert name="pie_pagina">
                        <ui:include src="pie_pagina.xhtml"/>
                    </ui:insert>
                </td>
            </tr>

        </table>
        <ui:include src="about.xhtml"/>
    </h:body>
</html>
