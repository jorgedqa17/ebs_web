<?xml version="1.0" encoding="UTF-8"?>
<!DOCTYPE html>
<ui:composition xmlns="http://www.w3.org/1999/xhtml" 
                xmlns:p="http://primefaces.org/ui"
                xmlns:h="http://java.sun.com/jsf/html"
                xmlns:f="http://java.sun.com/jsf/core"
                xmlns:ui="http://java.sun.com/jsf/facelets"
                >

    <!-- PLANTILLA PARA LAS AYUDAS  -->
    <p:dialog id="dialog_ayuda" header="Ayuda" widgetVar="ayudaPopup" modal="true" width="600" height="600" closeOnEscape="true">
        <p:panelGrid>
            <p:row>
                <p:column style="width: 40px;">
                    <img src="#{request.contextPath}/resources/imagenes/ayuda.png" style="margin-right: 10px;"/> 
                </p:column>
                <p:column style="width: 300px;">
                    <h:outputLabel styleClass="titulo" value="Ayuda del sistema" />
                </p:column>    
            </p:row>
        </p:panelGrid>
        <h:panelGrid>
            <h:outputLabel value="#{archivoAyuda}"  styleClass="subtitulo" />
        </h:panelGrid>
        <p:spacer height="10" />
        <p:panel style="text-align: justify;">
            <ui:insert name="contenidoAyuda" />
        </p:panel>
        <br/>
    </p:dialog>
</ui:composition>
