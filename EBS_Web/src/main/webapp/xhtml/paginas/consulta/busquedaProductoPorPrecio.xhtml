<?xml version="1.0" encoding="UTF-8"?>
<ui:composition template="/WEB-INF/template.xhtml"
                xmlns:p="http://primefaces.org/ui"
                xmlns:h="http://java.sun.com/jsf/html"
                xmlns:f="http://java.sun.com/jsf/core"
                xmlns:ui="http://java.sun.com/jsf/facelets">

    <ui:define name="title">Búsqueda de Productos por Tipo de Precio</ui:define>

    <ui:define name="content">
        <div class="ui-fluid">
            <div class="ui-g">
                <div class="ui-g-12">
                    <div class="card">
                        <h1>Búsqueda de Productos por Tipo de Precio</h1>

                        <p:panelGrid columns="4"
                                     columnClasses="ui-grid-col-2,ui-grid-col-4,ui-grid-col-2,ui-grid-col-2"
                                     layout="grid"
                                     styleClass="ui-panelgrid-blank"
                                     style="border:0px none; background-color:transparent;">

                            <p:outputLabel value="Tipo de Precio:" for="selectTipoPrecio"/>

                            <p:selectOneMenu id="selectTipoPrecio"
                                             value="#{beanBusquedaProductoPorPrecio.idTipoPrecioSeleccionado}"
                                             style="width:250px;">
                                <f:selectItem itemLabel="-- Seleccione --" itemValue="#{null}" noSelectionOption="true"/>
                                <f:selectItems value="#{beanBusquedaProductoPorPrecio.listaTiposPrecios}"
                                               var="tp"
                                               itemValue="#{tp.id_tipo}"
                                               itemLabel="#{tp.descripcion}"/>
                            </p:selectOneMenu>

                            <p:commandButton value="Buscar"
                                             icon="fa fa-search"
                                             update="panelResultados"
                                             actionListener="#{beanBusquedaProductoPorPrecio.buscarProductosPorTipoPrecio}"
                                             styleClass="ui-button-raised"/>

                            <p:commandButton ajax="false"
                                             value="Exportar Excel"
                                             icon="fa fa-file-excel-o"
                                             actionListener="#{beanBusquedaProductoPorPrecio.generarExcel}"
                                             styleClass="ui-button-raised ui-button-success">
                                <p:fileDownload value="#{beanBusquedaProductoPorPrecio.reporteDesplegar}"/>
                            </p:commandButton>

                        </p:panelGrid>
                    </div>

                    <p:outputPanel id="panelResultados">
                        <div class="card" rendered="#{not empty beanBusquedaProductoPorPrecio.listaResultados}">
                            <p:dataTable id="tablaProductosPorPrecio"
                                         value="#{beanBusquedaProductoPorPrecio.listaResultados}"
                                         var="item"
                                         reflow="true"
                                         paginator="true"
                                         paginatorPosition="bottom"
                                         rows="15"
                                         emptyMessage="No se encontraron productos.">

                                <p:column headerText="Nombre Producto" style="text-align: left;">
                                    <p:outputLabel value="#{item.nombreProducto}"/>
                                </p:column>

                                <p:column headerText="Precio" style="text-align: right; width: 150px;">
                                    <p:outputLabel value="#{item.precio}">
                                        <f:convertNumber pattern="#,##0.000" type="currency" currencySymbol="₡" locale="en_US"/>
                                    </p:outputLabel>
                                </p:column>

                            </p:dataTable>
                        </div>
                    </p:outputPanel>

                </div>
            </div>
        </div>
    </ui:define>

</ui:composition>
