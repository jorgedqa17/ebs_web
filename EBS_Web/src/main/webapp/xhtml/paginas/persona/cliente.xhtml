<?xml version="1.0" encoding="UTF-8"?>
<ui:composition xmlns="http://www.w3.org/1999/xhtml" 
                xmlns:p="http://primefaces.org/ui"
                xmlns:h="http://java.sun.com/jsf/html"
                xmlns:f="http://java.sun.com/jsf/core"
                xmlns:ui="http://java.sun.com/jsf/facelets">


    <p:panelGrid rendered="#{beanFactura.verPanelNuevaPersona}" columns="4" columnClasses="ui-grid-col-2,ui-grid-col-4,ui-grid-col-2,ui-grid-col-4" layout="grid" styleClass="ui-panelgrid-blank" style="border:0px none; background-color:transparent;">
        <h2>Nuevo Cliente</h2>
        <h:outputText value="" />
        <h:outputText value="" />
        <h:outputText value="" />

        <h:outputText value="#{label['receptor.requiere.transporte']}" rendered="#{beanFactura.verPanelNuevaPersona}" />
        <p:selectBooleanCheckbox  rendered="#{beanFactura.verPanelNuevaPersona}" id="chkRequiereTrans" value="#{beanPersona.requiereTransporte}" disabled="#{beanPersona.terminoProcesoCorrectamente}"/>

        <p:outputLabel rendered="#{beanFactura.verPanelNuevaPersona}" for="listaTipoClienteNPER" value="#{label['receptor.tipo.cliente']}" />
        <p:selectOneMenu rendered="#{beanFactura.verPanelNuevaPersona}" disabled="#{beanPersona.terminoProcesoCorrectamente}"  converter="ConvertidorListaDesplegables" 
                         valueChangeListener="#{beanPersona.seleccionarTiposClientes}"
                         value="#{beanPersona.idTipoClienteSeleccionado}" 
                         id="listaTipoClienteNPER"                       
                         effect="fold" >     
            <p:ajax event="change"  />       
            <f:selectItem itemLabel="Seleccione" itemValue="0" />
            <f:selectItems value="#{beanPersona.listaTiposClientes}"
                           var="tipoCliente"
                           itemLabel="#{tipoCliente.descripcion}"
                           itemValue="#{tipoCliente.id_tipo_cliente}"/>
        </p:selectOneMenu>                   

        <p:outputLabel rendered="#{beanFactura.verPanelNuevaPersona}" for="listaTipoIdentificacion" value="#{label['receptor.tipo.identificacion']}" />
        <p:selectOneMenu rendered="#{beanFactura.verPanelNuevaPersona}" disabled="#{beanPersona.terminoProcesoCorrectamente}"  converter="ConvertidorListaDesplegables" 
                         valueChangeListener="#{beanPersona.seleccionarTipoCedula}"
                         value="#{beanPersona.tipoIdentificacionSeleccionadaReceptor}" 
                         id="listaTipoIdentificacionNPER"                         
                         effect="fold" >     
            <p:ajax event="change" update="txtIdentificacionNPER" />      
            <f:selectItem itemLabel="Seleccione" itemValue="0" />
            <f:selectItems value="#{beanPersona.listaTiposCedulas}"
                           var="tipoCedula"
                           itemLabel="#{tipoCedula.descripcion}"
                           itemValue="#{tipoCedula.id_tipo_cedula}"/>
        </p:selectOneMenu>

        <p:outputLabel rendered="#{beanFactura.verPanelNuevaPersona}" id="lblIdentificacionNPER" value="#{label['receptor.identificacion']}"/>
        <p:inputMask rendered="#{beanFactura.verPanelNuevaPersona}" disabled="#{beanPersona.terminoProcesoCorrectamente}" id="txtIdentificacionNPER" 
                     value="#{beanPersona.identificacion}"                     
                     maxlength="#{beanPersona.tamannoCedula}" 
                     mask="#{beanPersona.mascaraSeleccionada}">
            <p:ajax event="blur" listener="#{beanPersona.buscarPersonaTSE}"
                    update="txtNombreReceptoNPER, txtPrimerApellidoReceptoNPER, txtSegundoApellidReceptoNPER, listaCorreosElectronicos"></p:ajax>
        </p:inputMask>                     

        <p:outputLabel rendered="#{beanFactura.verPanelNuevaPersona}" id="lblNombreReceptorNPER" value="#{label['receptor.nombre']}"/>
        <p:inputText rendered="#{beanFactura.verPanelNuevaPersona}" id="txtNombreReceptoNPER" disabled="#{beanPersona.esPersonaJuridica}" maxlength="50"  value="#{beanPersona.persona.nombre}" />

        <p:outputLabel rendered="#{beanFactura.verPanelNuevaPersona}" id="lblPrimerApellidoReceptorNPER" value="#{label['receptor.nombre.primer.apellido']}"/>
        <p:inputText  rendered="#{beanFactura.verPanelNuevaPersona}" id="txtPrimerApellidoReceptoNPER" disabled="#{beanPersona.esPersonaJuridica}" maxlength="50"  value="#{beanPersona.persona.primer_apellido}" />

        <p:outputLabel rendered="#{beanFactura.verPanelNuevaPersona}" id="lblSegundoApellidoNPER" value="#{label['receptor.nombre.segundo.apellido']}"/>
        <p:inputText rendered="#{beanFactura.verPanelNuevaPersona}" id="txtSegundoApellidReceptoNPER" disabled="#{beanPersona.esPersonaJuridica}" maxlength="50"  value="#{beanPersona.persona.segundo_apellido}" />

        <p:outputLabel rendered="#{beanFactura.verPanelNuevaPersona}" id="lblNombreFantasiaReceptorNPER" value="#{label['receptor.nombre.nombre.fantasia']}"/>
        <p:inputText rendered="#{beanFactura.verPanelNuevaPersona}" id="txtNombreFantasiaReceptoNPER" disabled="#{beanPersona.terminoProcesoCorrectamente}"  value="#{beanPersona.persona.nombre_fantasia}" />    

      <!--  <p:outputLabel rendered="#{beanFactura.verPanelNuevaPersona}"  id="lblCorreoElectronicoNPER" value="#{label['receptor.correo.electronico']}"/>
        <p:inputText rendered="#{beanFactura.verPanelNuevaPersona}" disabled="#{beanPersona.terminoProcesoCorrectamente}" id="txtCorreoElectronicoNPER" maxlength="50"   value="#{beanPersona.persona.correo_electronico}" >
            <f:validator validatorId="EmailValidator" />
        </p:inputText>-->

        <p:outputLabel rendered="#{beanFactura.verPanelNuevaPersona}" id="lblTelefonoNPER" value="#{label['receptor.telefono']}"/>
        <p:inputMask rendered="#{beanFactura.verPanelNuevaPersona}" disabled="#{beanPersona.terminoProcesoCorrectamente}" mask="99999999" id="txtTelefonoNPER" onkeypress="javascript:return soloNumeros(event);" maxlength="8" value="#{beanPersona.persona.telefono_1}" />

        <p:outputLabel rendered="#{beanFactura.verPanelNuevaPersona}" id="lblTelefono2NPER" value="#{label['receptor.telefono2']}"/>
        <p:inputMask rendered="#{beanFactura.verPanelNuevaPersona}" disabled="#{beanPersona.terminoProcesoCorrectamente}" mask="99999999" id="txtTelefono2NPER" onkeypress="javascript:return soloNumeros(event);" maxlength="8" value="#{beanPersona.persona.telefono_2}" />

        <p:outputLabel rendered="#{beanFactura.verPanelNuevaPersona}" id="lblCodAreaNPER" value="#{label['receptor.telefono.codigo.area']}"/>
        <p:inputText rendered="#{beanFactura.verPanelNuevaPersona}" disabled="#{beanPersona.terminoProcesoCorrectamente}" onkeypress="javascript:return soloNumeros(event);" maxlength="3" id="txtCodAreaNPER"   value="#{beanPersona.persona.codigo_pais}" />


        <h:outputText value="Exento" rendered="#{beanFactura.verPanelNuevaPersona}" />
        <p:selectBooleanCheckbox rendered="#{beanFactura.verPanelNuevaPersona}" id="chkExento" disabled="#{beanPersona.terminoProcesoCorrectamente or beanPersona.persona.esExonerado}" value="#{beanPersona.persona.esExento}">
            <p:ajax update=":form_sisadmin:chkExonerado" listener="#{beanPersona.marcarPersonaExenta}"  />
        </p:selectBooleanCheckbox>
        <h:outputText value="Exonerado" rendered="#{beanFactura.verPanelNuevaPersona}"/>
        <p:selectBooleanCheckbox rendered="#{beanFactura.verPanelNuevaPersona}" id="chkExonerado" disabled="#{beanPersona.terminoProcesoCorrectamente or beanPersona.persona.esExento}" value="#{beanPersona.persona.esExonerado}">
            <p:ajax update=":form_sisadmin:chkExento" listener="#{beanPersona.marcarPersonaExonerada}"  />
        </p:selectBooleanCheckbox>


        <p:outputLabel  rendered="#{beanFactura.verPanelNuevaPersona}" id="lblProvinciaNPER" value="#{label['receptor.provincia']}"/>
        <p:selectOneMenu rendered="#{beanFactura.verPanelNuevaPersona}" disabled="#{beanPersona.terminoProcesoCorrectamente}" converter="ConvertidorListaDesplegables" 
                         valueChangeListener="#{beanPersona.seleccionarProvincias}"
                         value="#{beanPersona.idProvinciaSeleccionadaReceptor}" 
                         id="listaProvinciasNPER"    
                         filter="true" filterMatchMode="startsWith"
                         effect="fold" >     
            <p:ajax event="change" update="listaCantonesNPER" />   
            <f:selectItem itemLabel="Seleccione" itemValue="0" />
            <f:selectItems value="#{beanPersona.listaProvincias}"
                           var="provinciaP"
                           itemLabel="#{provinciaP.descripcion}"
                           itemValue="#{provinciaP.id_provincia}"/>
        </p:selectOneMenu>

        <p:outputLabel rendered="#{beanFactura.verPanelNuevaPersona}" id="lblCantonNPER" value="#{label['receptor.canton']}"/>
        <p:selectOneMenu rendered="#{beanFactura.verPanelNuevaPersona}" disabled="#{beanPersona.terminoProcesoCorrectamente}"  converter="ConvertidorListaDesplegables" 
                         valueChangeListener="#{beanPersona.seleccionarCantones}"
                         value="#{beanPersona.idCantonSeleccionadaReceptor}" 
                         id="listaCantonesNPER"       
                         filter="true" filterMatchMode="startsWith"
                         effect="fold" >     
            <p:ajax event="change" update="listaDistritosNPER" />   
            <f:selectItem itemLabel="Seleccione" itemValue="0" />
            <f:selectItems value="#{beanPersona.listaCantones}"
                           var="cantonP"
                           itemLabel="#{cantonP.descripcion}"
                           itemValue="#{cantonP.id_canton}"/>
        </p:selectOneMenu>

        <p:outputLabel rendered="#{beanFactura.verPanelNuevaPersona}" id="lblDistritoNPER" value="#{label['receptor.distrito']}"/>
        <p:selectOneMenu rendered="#{beanFactura.verPanelNuevaPersona}" disabled="#{beanPersona.terminoProcesoCorrectamente}"   converter="ConvertidorListaDesplegables" 
                         valueChangeListener="#{beanPersona.seleccionarDistritos}"
                         value="#{beanPersona.idDistritoSeleccionadaReceptor}" 
                         id="listaDistritosNPER"         
                         filter="true" filterMatchMode="startsWith"
                         effect="fold" >     
            <p:ajax event="change" update="listaBarriosNPER" />       
            <f:selectItem itemLabel="Seleccione" itemValue="0" />
            <f:selectItems value="#{beanPersona.listaDistritos}"
                           var="distritoP"
                           itemLabel="#{distritoP.descripcion}"
                           itemValue="#{distritoP.id_distrito}"/>
        </p:selectOneMenu>

        <p:outputLabel rendered="#{beanFactura.verPanelNuevaPersona}" id="lblBarrioNPER" value="#{label['receptor.barrio']}"/>
        <p:selectOneMenu rendered="#{beanFactura.verPanelNuevaPersona}" disabled="#{beanPersona.terminoProcesoCorrectamente}" converter="ConvertidorListaDesplegables"           
                         valueChangeListener="#{beanPersona.seleccionarBarrios}"
                         value="#{beanPersona.idBarioSeleccionadaReceptor}" 
                         id="listaBarriosNPER"     
                         filter="true" filterMatchMode="startsWith"
                         effect="fold" >     
            <p:ajax event="change"  />         
            <f:selectItem itemLabel="Seleccione" itemValue="0" />
            <f:selectItems value="#{beanPersona.listaBarrios}"
                           var="barrioP"
                           itemLabel="#{barrioP.descripcion}"
                           itemValue="#{barrioP.id_barrio}"/>
        </p:selectOneMenu> 
        <p:outputLabel rendered="#{beanFactura.verPanelNuevaPersona}" id="lblOtraSennasNPER" value="#{label['receptor.otras.sennas']}"/>
        <p:inputTextarea rendered="#{beanFactura.verPanelNuevaPersona}"   rows="5" cols="200"  disabled="#{beanPersona.terminoProcesoCorrectamente}"  counter="displayPersonas" 
                         value="#{beanPersona.persona.direccion}" maxlength="100" counterTemplate="{0} restantes." id="txtOtraSennasNPER" autoResize="false" />       
        <p:outputLabel  value=""/>
        <p:outputLabel  value=""/>
        <p:outputLabel  value=""/>
        <h:outputText rendered="#{beanFactura.verPanelNuevaPersona}" id="displayPersonas" />     

        <p:outputLabel id="actEconoc" value="Actividad Económica:"/>
        <p:selectOneMenu  converter="ConvertidorListaDesplegables"           
                          valueChangeListener="#{beanPersona.seleccionarActividad}"
                          value="#{beanPersona.idActvidadSeleccionada}" 
                          id="listaActividadEconocimca"     
                          rendered="#{beanFactura.verPanelNuevaPersona}"
                          filter="true" filterMatchMode="startsWith"
                          effect="fold" >     
            <p:ajax event="change"  />         
            <f:selectItem itemLabel="Seleccione" itemValue="0" />
            <f:selectItems value="#{beanPersona.listaTiposActividadesEconomicas}"
                           var="barrioP"
                           itemLabel="#{barrioP.dscCIIU3}"
                           itemValue="#{barrioP.idCodigoActividad}"/>
        </p:selectOneMenu>  

    </p:panelGrid>
    <p:panelGrid columns="2" columnClasses="ui-grid-col-16, ui-grid-col-16"  layout="grid" styleClass="ui-panelgrid-blank" 
                 style="border:0px none; background-color:transparent;">
        <p:commandButton id="btnVerModalEx" action="#{beanPersona.agregarExoneracionFactura}"
                         value="Agregar Exoneraciones" 
                         rendered="#{beanFactura.verPanelNuevaPersona}" 
                         icon="fa fa-save"
                         update=":form_sisadmin:listaPersonas, :form_sisadmin,listaTipoIdentificacionNPER,btnGuadarPersona,
                         chkRequiereTrans,listaTipoClienteNPER,txtIdentificacionNPER,txtNombreFantasiaReceptoNPER,txtOtraSennasNPER,
                         listaProvinciasNPER, listaCantonesNPER,listaDistritosNPER,listaBarriosNPER,
                         txtCodAreaNPER,txtTelefono2NPER,txtTelefonoNPER,txtCorreoElectronicoNPER,listaActividadEconocimca"/>
    </p:panelGrid>

    <h2 rendered="#{beanFactura.verPanelNuevaPersona}" disabled="#{beanPersona.terminoProcesoCorrectamente}">Listado de correos electrónicos</h2>
    <br/><br/>  
    <p:panelGrid  columns="5" columnClasses="ui-grid-col-2,ui-grid-col-2,ui-grid-col-2" layout="grid" styleClass="ui-panelgrid-blank" style="border:0px none; background-color:transparent;">
        <p:outputLabel id="lblalias" value="Alias"/>
        <p:inputText   disabled="#{beanPersona.terminoProcesoCorrectamente}" rendered="#{beanFactura.verPanelNuevaPersona}" id="txtAlias" maxlength="50"   value="#{beanPersona.alias}" >
        </p:inputText> 
        <p:outputLabel id="lblCorreoElectronicoNPER" value="#{label['receptor.correo.electronico']}"/>
        <p:inputText  rendered="#{beanFactura.verPanelNuevaPersona}" disabled="#{beanPersona.terminoProcesoCorrectamente}"   id="txtCorreoElectronicoNPER" maxlength="50"   value="#{beanPersona.correoElectronico}" >
            <f:validator validatorId="EmailValidator" />
        </p:inputText> 
        <p:commandButton id="btnGuardarCorreo" icon="fa fa-plus" rendered="#{beanFactura.verPanelNuevaPersona}" disabled="#{beanPersona.terminoProcesoCorrectamente}" value="Agregar Correo" update="listaCorreosElectronicos,txtCorreoElectronicoNPER" actionListener="#{beanPersona.agregarCorreoElectronico}"/>
    </p:panelGrid>
    <p:panelGrid   columns="1" columnClasses="ui-grid-col-16" layout="grid" styleClass="ui-panelgrid-blank" style="border:0px none; background-color:transparent;">


        <p:dataTable id="listaCorreosElectronicos" 
                     value="#{beanPersona.persona.listaCorreosPersona}"
                     var="correo"
                     rendered="#{beanFactura.verPanelNuevaPersona}" 
                     paginator="true" 
                     rowKey="#{correo}"
                     paginatorPosition="bottom" 
                     reflow="true"
                     rows="10"                       
                     emptyMessage="#{label['tabla.vacia']}">
            <p:column headerText="Alias" >
                <h:outputText id="alias" value="#{correo.alias_cliente}" />  
            </p:column> 
            <p:column headerText="Correo Electrónico" >
                <h:outputText id="correoElec" value="#{correo.correo_electronico}" />  
            </p:column>                
            <p:column >
                <p:commandButton id="btnElmiinarRegistroCorreo" 

                                 icon="ui-icon-trash" 
                                 actionListener="#{beanPersona.eliminarCorreoElectronico(correo)}" 
                                 update="listaCorreosElectronicos">                    
                </p:commandButton>
            </p:column>
        </p:dataTable>
    </p:panelGrid>




    <p:panelGrid columns="2"  columnClasses="ui-grid-col-2,ui-grid-col-2" layout="grid" styleClass="ui-panelgrid-blank" style="border:0px none; background-color:transparent;">
        <p:commandButton rendered="#{beanFactura.verPanelNuevaPersona}" id="btnGuadarPersona" actionListener="#{beanPersona.guardarPersona}" 
                         value="#{label['anulacion.guardar']}"
                         disabled="#{beanPersona.terminoProcesoCorrectamente}"
                         update=":form_sisadmin,listaTipoIdentificacionNPER,btnGuadarPersona,chkRequiereTrans,listaTipoClienteNPER,txtIdentificacionNPER,txtNombreFantasiaReceptoNPER,txtOtraSennasNPER,listaProvinciasNPER, listaCantonesNPER,listaDistritosNPER,listaBarriosNPER,txtCodAreaNPER,txtTelefono2NPER,txtTelefonoNPER,txtCorreoElectronicoNPER"/>

        <p:commandButton rendered="#{beanFactura.verPanelNuevaPersona}" id="btnCerrarModal"
                         value="Terminar"             
                         ajax="false"
                         action="#{beanPersona.inicializar()}"
                         actionListener="#{beanFactura.buscarPersonaPorCedula(beanPersona.persona.personaPK.numero_cedula,beanPersona.persona.personaPK.id_tipo_cedula)}"
                         update=":form_sisadmin, :form_sisadmin:panelReceptorIdentificacion"/>

    </p:panelGrid>

    <p:dialog   header="Exoneración" 
                widgetVar="idDialogoExoneracion2" 
                modal="true"    
                minWidth="1000"
                id="idDialogoExoneracion2"
                showEffect="fade" 
                hideEffect="fade" 
                resizable="true">
        <div class="card">   
            <p:panelGrid   columnClasses="ui-grid-col-4" columns="1" layout="grid" styleClass="ui-panelgrid-blank" style="border:0px none; background-color:transparent;">

                <p:outputLabel value="Número de Documento" />
                <p:inputText id="txtNumDoc2" maxlength="40" 
                             value="#{beanPersona.exoneracionUsuario.numeroDocumento}" >
                    <p:ajax event="blur" listener="#{beanPersona.buscarExoneracion}"
                            update="listaInstituciones,listaExoneraciones2,fechaEmisionExoneracionLinea2,txtArticulo,txtArticulo"></p:ajax>
                </p:inputText>
                <p:outputLabel value="#{label['producto.exoneracion.relacionada']}" />
                <p:selectOneMenu  converter="ConvertidorListaDesplegables" 
                                  filter="true" filterMatchMode="startsWith"
                                  value="#{beanPersona.codigoExoneracion}" 
                                  id="listaExoneraciones2"                         
                                  effect="fold"  >                         
                    <f:selectItem itemLabel="Seleccione" itemValue="0" />
                    <f:selectItems value="#{beanPersona.listaTipoExoneracion}"
                                   var="exoneracion"
                                   itemLabel="#{exoneracion.descripcion}"
                                   itemValue="#{exoneracion.id_exoneracion}"/>
                </p:selectOneMenu> 
                <p:outputLabel value="Nombre Institución" />
                <p:selectOneMenu  converter="ConvertidorListaDesplegables" 
                                  filter="true" filterMatchMode="startsWith"
                                  value="#{beanPersona.exoneracionUsuario.codigoInstitucion}" 
                                  id="listaInstituciones"                         
                                  effect="fold"  >                         
                    <f:selectItem itemLabel="Seleccione" itemValue="0" />
                    <f:selectItem itemLabel="Ministerio de Hacienda" itemValue="01" />
                    <f:selectItem itemLabel="Ministerio de Relaciones Exteriores y Culto" itemValue="02" />
                    <f:selectItem itemLabel="Ministerio de Agricultura y Ganadería" itemValue="03" />
                    <f:selectItem itemLabel="Ministerio de Economía, Industria y Comercio" itemValue="04" />
                    <f:selectItem itemLabel="Cruz Roja Costarricense" itemValue="05" />
                    <f:selectItem itemLabel="Benemérito Cuerpo de Bomberos de Costa Rica" itemValue="06" />
                    <f:selectItem itemLabel="Asociación Obras del Espíritu Santo" itemValue="07" />
                    <f:selectItem itemLabel="Federación Cruzada Nacional de protección al Anciano (Fecrunapa)" itemValue="08" />
                    <f:selectItem itemLabel="Escuela de Agricultura de la Región Húmeda (EARTH)" itemValue="09" />
                    <f:selectItem itemLabel="Instituto Centroamericano de Administración de Empresas (INCAE)" itemValue="10" />
                    <f:selectItem itemLabel="Junta de Protección Social (JPS)" itemValue="11" />
                    <f:selectItem itemLabel="Autoridad Reguladora de los Servicios Públicos (Aresep)" itemValue="12" />
                    <f:selectItem itemLabel="Otros" itemValue="99" />
                </p:selectOneMenu> 


                <p:outputLabel value="Fecha Emisión" />
                <p:inputText id="fechaEmisionExoneracionLinea2" maxlength="6" 
                             value="#{beanPersona.exoneracionUsuario.fechaEmision}" >
                </p:inputText>

                <p:outputLabel value="Articulo" />
                <p:inputText id="txtArticulo" maxlength="6" 
                             value="#{beanPersona.exoneracionUsuario.articulo}" >
                </p:inputText>
                <p:outputLabel value="Inciso" />
                <p:inputText id="txtInciso" maxlength="6" 
                             value="#{beanPersona.exoneracionUsuario.inciso}" >
                </p:inputText>

                <p:commandButton  
                    update="mensajes" 
                    icon="fa fa-save"
                    id="btnGuardarExoneracion2" 
                    actionListener="#{beanPersona.agregarExoneracionLinea}"
                    value="#{label['anulacion.guardar']}" >
                </p:commandButton>      
                <p:outputLabel value="" />
            </p:panelGrid>
        </div>
    </p:dialog>


</ui:composition>
